# ============================================================
#  WildGuard – Mosquitto MQTT Broker
#  Equivale a AWS IoT Core del pipeline
# ============================================================

# Puerto MQTT estándar (sin TLS — para desarrollo local)
listener 1883
protocol mqtt

# Puerto WebSockets (para monitoreo desde browser)
listener 9001
protocol websockets

# Permitir conexiones anónimas (en prod usaría certificados TLS)
allow_anonymous true

# Persistencia de mensajes
persistence true
persistence_location /mosquitto/data/

# Logs
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type all

# Retención máxima de mensajes en cola
max_queued_messages 5000

# Keep-alive
keepalive_interval 60
